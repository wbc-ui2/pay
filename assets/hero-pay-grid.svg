<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Material elevation-4 shadow filter -->
    <filter id="elevation4" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <!-- Gradients for tiles -->
    <linearGradient id="paypalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003087"/>
      <stop offset="100%" style="stop-color:#0079C1"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#FFAB40"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#311B92"/>
      <stop offset="100%" style="stop-color:#7E57C2"/>
    </linearGradient>
    <!-- Typography styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }
      .sans { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- TOP BAND -->
  <rect x="0" y="0" width="1280" height="48" fill="#0d0d14"/>
  <text x="520" y="30" class="mono" font-size="16" fill="#8a8aa0" text-anchor="end">
    &lt;WbPayHub :providers="…" /&gt;
  </text>
  <text x="540" y="30" class="sans" font-size="14" fill="#4a4a5e" text-anchor="middle">·</text>
  <text x="560" y="30" class="sans" font-size="14" fill="#6c6c80" text-anchor="start">
    data-driven payment support grid
  </text>

  <!-- LEFT PANE — code editor -->
  <rect x="0" y="48" width="636" height="592" fill="#1e1e2e"/>
  <text x="40" y="88" class="sans" font-size="11" fill="#585870" font-weight="500" letter-spacing="1.5">
    WHAT YOU WRITE
  </text>

  <!-- App.vue Tab -->
  <rect x="56" y="105" width="130" height="26" rx="4" fill="#313244"/>
  <text x="70" y="122" class="mono" font-size="11" fill="#89b4fa">App.vue</text>
  <circle cx="172" cy="118" r="3" fill="#45475a"/>

  <!-- Code Block -->
  <!-- Line 1: <WbPayHub -->
  <text x="56" y="155" class="mono" font-size="15">
    <tspan fill="#cba6f7">&lt;</tspan><tspan fill="#89b4fa">WbPayHub</tspan>
  </text>
  <!-- Line 2:   :providers="[ -->
  <text x="56" y="185" class="mono" font-size="15">
    <tspan fill="#a6e3a1">    :providers</tspan><tspan fill="#cdd6f4">=</tspan><tspan fill="#f9e2af">"[</tspan>
  </text>
  <!-- Line 3:     { -->
  <text x="56" y="215" class="mono" font-size="15">
    <tspan fill="#cdd6f4">      {</tspan>
  </text>
  <!-- Line 4:       id: 'paypal', -->
  <text x="56" y="245" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        id</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'paypal'</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <!-- Line 5:       label: 'PayPal', -->
  <text x="56" y="275" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        label</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'PayPal'</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <!-- Line 6:       icon: 'mdi-currency-usd', -->
  <text x="56" y="305" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        icon</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'mdi-currency-usd'</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <!-- Line 7:       url: 'https://paypal.me/wissemb11', -->
  <text x="56" y="335" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        url</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'https://paypal.me/wissemb11'</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <!-- Line 8:       kind: 'tip' -->
  <text x="56" y="365" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        kind</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'tip'</tspan>
  </text>
  <!-- Line 9:     }, -->
  <text x="56" y="395" class="mono" font-size="15">
    <tspan fill="#cdd6f4">      },</tspan>
  </text>
  <!-- Line 10:     { -->
  <text x="56" y="425" class="mono" font-size="15">
    <tspan fill="#cdd6f4">      {</tspan>
  </text>
  <!-- Line 11:       id: 'btc', -->
  <text x="56" y="455" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        id</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'btc'</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <!-- Line 12:       label: 'Bitcoin', -->
  <text x="56" y="485" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        label</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'Bitcoin'</tspan><tspan fill="#cdd6f4">,</tspan>
  </text>
  <!-- Line 13:       address: { addr: 'bc1q...', network: 'bitcoin' } -->
  <text x="56" y="515" class="mono" font-size="15">
    <tspan fill="#cdd6f4">        address</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#cdd6f4"> { addr</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'bc1q...'</tspan><tspan fill="#cdd6f4">, network</tspan><tspan fill="#89b4fa">:</tspan><tspan fill="#f9e2af"> 'bitcoin'</tspan><tspan fill="#cdd6f4"> }</tspan>
  </text>
  <!-- Line 14:     } -->
  <text x="56" y="545" class="mono" font-size="15">
    <tspan fill="#cdd6f4">      }</tspan>
  </text>
  <!-- Line 15:   ]" -->
  <text x="56" y="575" class="mono" font-size="15">
    <tspan fill="#f9e2af">    ]"</tspan>
  </text>
  <!-- Line 16: /> -->
  <text x="56" y="605" class="mono" font-size="15">
    <tspan fill="#cba6f7">/&gt;</tspan>
  </text>

  <!-- Line numbers -->
  <text x="40" y="155" class="mono" font-size="11" fill="#45475a" text-anchor="end">1</text>
  <text x="40" y="185" class="mono" font-size="11" fill="#45475a" text-anchor="end">2</text>
  <text x="40" y="215" class="mono" font-size="11" fill="#45475a" text-anchor="end">3</text>
  <text x="40" y="245" class="mono" font-size="11" fill="#45475a" text-anchor="end">4</text>
  <text x="40" y="275" class="mono" font-size="11" fill="#45475a" text-anchor="end">5</text>
  <text x="40" y="305" class="mono" font-size="11" fill="#45475a" text-anchor="end">6</text>
  <text x="40" y="335" class="mono" font-size="11" fill="#45475a" text-anchor="end">7</text>
  <text x="40" y="365" class="mono" font-size="11" fill="#45475a" text-anchor="end">8</text>
  <text x="40" y="395" class="mono" font-size="11" fill="#45475a" text-anchor="end">9</text>
  <text x="40" y="425" class="mono" font-size="11" fill="#45475a" text-anchor="end">10</text>
  <text x="40" y="455" class="mono" font-size="11" fill="#45475a" text-anchor="end">11</text>
  <text x="40" y="485" class="mono" font-size="11" fill="#45475a" text-anchor="end">12</text>
  <text x="40" y="515" class="mono" font-size="11" fill="#45475a" text-anchor="end">13</text>
  <text x="40" y="545" class="mono" font-size="11" fill="#45475a" text-anchor="end">14</text>
  <text x="40" y="575" class="mono" font-size="11" fill="#45475a" text-anchor="end">15</text>
  <text x="40" y="605" class="mono" font-size="11" fill="#45475a" text-anchor="end">16</text>

  <!-- CENTRE DIVIDER -->
  <line x1="640" y1="48" x2="640" y2="640" stroke="#3b3b4f" stroke-width="1"/>
  <circle cx="640" cy="344" r="18" fill="#5E35B1"/>
  <text x="640" y="351" class="sans" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="600">→</text>

  <!-- RIGHT PANE -->
  <rect x="644" y="48" width="636" height="592" fill="#f8fafc"/>
  <text x="680" y="88" class="sans" font-size="11" fill="#94a3b8" font-weight="500" letter-spacing="1.5">
    WHAT GETS RENDERED
  </text>

  <!-- Browser Chrome Info -->
  <circle cx="700" cy="118" r="5" fill="#cbd5e1"/>
  <circle cx="716" cy="118" r="5" fill="#cbd5e1"/>
  <circle cx="732" cy="118" r="5" fill="#cbd5e1"/>
  <rect x="750" y="112" width="220" height="12" rx="6" fill="#f1f5f9"/>
  <text x="860" y="122" class="mono" font-size="8" fill="#94a3b8" text-anchor="middle">localhost:5173/support</text>

  <!-- Rendered Payment Grid Cards -->
  <!-- Card 1: PayPal -->
  <g transform="translate(680, 160)" filter="url(#elevation4)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#ffffff"/>
    
    <!-- Icon Container -->
    <rect x="20" y="20" width="48" height="48" rx="24" fill="url(#paypalGrad)"/>
    <!-- Stylized $ Icon -->
    <text x="44" y="52" class="sans" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">$</text>
    
    <!-- Badges -->
    <rect x="195" y="20" width="45" height="20" rx="10" fill="#e0f2fe"/>
    <text x="217" y="33" class="sans" font-size="10" fill="#0369a1" font-weight="bold" text-anchor="middle">TIP</text>

    <!-- Card Content -->
    <text x="20" y="95" class="sans" font-size="18" fill="#0f172a" font-weight="bold">PayPal</text>
    <text x="20" y="120" class="sans" font-size="13" fill="#64748b">One-tap support via PayPal</text>
    <text x="20" y="138" class="sans" font-size="13" fill="#64748b">works in most countries.</text>

    <!-- Action Hint -->
    <text x="20" y="160" class="sans" font-size="11" fill="#4f46e5" font-weight="600">Click to open website ↗</text>
  </g>

  <!-- Card 2: Bitcoin -->
  <g transform="translate(680, 370)" filter="url(#elevation4)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#ffffff"/>
    
    <!-- Icon Container -->
    <rect x="20" y="20" width="48" height="48" rx="24" fill="url(#btcGrad)"/>
    <!-- Stylized B Icon -->
    <text x="44" y="53" class="mono" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">₿</text>
    
    <!-- Badges -->
    <rect x="175" y="20" width="65" height="20" rx="10" fill="#fef3c7"/>
    <text x="207" y="33" class="sans" font-size="10" fill="#b45309" font-weight="bold" text-anchor="middle">CRYPTO</text>

    <!-- Card Content -->
    <text x="20" y="95" class="sans" font-size="18" fill="#0f172a" font-weight="bold">Bitcoin</text>
    <text x="20" y="120" class="sans" font-size="13" fill="#64748b">bc1q... (bech32)</text>
    <text x="20" y="138" class="sans" font-size="13" fill="#64748b">Click to copy address</text>

    <!-- Action Hint -->
    <text x="20" y="160" class="sans" font-size="11" fill="#4f46e5" font-weight="600">Click to copy address 📋</text>
  </g>

  <!-- App Logo / Hub Branding Badge -->
  <g transform="translate(980, 260)" filter="url(#elevation4)">
    <rect x="0" y="0" width="240" height="190" rx="16" fill="url(#appGrad)"/>
    <text x="120" y="50" class="sans" font-size="14" fill="#e9d5ff" font-weight="bold" text-anchor="middle" letter-spacing="1">WbPayHub</text>
    <text x="120" y="90" class="sans" font-size="26" fill="#ffffff" font-weight="900" text-anchor="middle">Vue 2.7+</text>
    <text x="120" y="125" class="sans" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle">Support UI Engine</text>
    
    <!-- Small sub text -->
    <rect x="60" y="145" width="120" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
    <text x="120" y="161" class="sans" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">@wbc-ui2/pay</text>
  </g>

  <!-- Outer Border -->
  <rect x="0" y="0" width="1280" height="640" fill="none" stroke="#e2e8f0" stroke-width="1"/>
</svg>
