<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="pay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="fiat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="crypto" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="host" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5E35B1"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap');
      .sans { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
      .mono { font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace; }
    </style>
  </defs>

  <rect width="780" height="520" rx="10" fill="url(#bg)"/>

  <text x="390" y="30" text-anchor="middle" class="sans" font-weight="900" font-size="15" fill="#cdd6f4" letter-spacing="1.5">@wbc-ui2/pay — PROVIDER DISPATCH ARCHITECTURE</text>
  <text x="390" y="50" text-anchor="middle" class="sans" font-size="11" fill="#585870">Host-owned data · Package-owned UI · One &lt;WbPayHub&gt; renders it all</text>

  <!-- ====== HOST DATA BOX ====== -->
  <rect x="50" y="75" width="240" height="145" rx="8" fill="#14142b" stroke="#4527A0" stroke-width="1" filter="url(#shadow)"/>
  <text x="170" y="100" text-anchor="middle" class="sans" font-weight="700" font-size="12" fill="#B39DDB">Host Application</text>
  <text x="170" y="120" text-anchor="middle" class="mono" font-size="10" fill="#8a8aa0">:providers="PROVIDERS"</text>
  <text x="170" y="138" text-anchor="middle" class="mono" font-size="10" fill="#8a8aa0">:product="wb-code"</text>
  <text x="170" y="156" text-anchor="middle" class="mono" font-size="10" fill="#8a8aa0">:recipient="ME"</text>
  <text x="170" y="174" text-anchor="middle" class="mono" font-size="10" fill="#8a8aa0">:branding="BRANDING"</text>

  <!-- Arrow host → hub -->
  <line x1="290" y1="148" x2="340" y2="148" stroke="#00897B" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <defs><marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00897B"/></marker></defs>

  <!-- ====== WbPayHub CENTER ====== -->
  <rect x="345" y="90" width="200" height="115" rx="12" fill="url(#pay)" filter="url(#shadow)"/>
  <text x="445" y="125" text-anchor="middle" class="sans" font-weight="900" font-size="14" fill="#fff">&lt;WbPayHub&gt;</text>
  <text x="445" y="142" text-anchor="middle" class="sans" font-size="10" fill="#B2DFDB">Polymorphic renderer</text>
  <text x="445" y="158" text-anchor="middle" class="sans" font-size="9" fill="#80CBC4">dispatch on kind / address</text>

  <!-- Arrow hub → fiat -->
  <line x1="445" y1="210" x2="300" y2="280" stroke="#1976D2" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrow hub → crypto -->
  <line x1="445" y1="210" x2="445" y2="280" stroke="#F57C00" stroke-width="1.5" opacity="0.6"/>
  <!-- Arrow hub → expansion -->
  <line x1="445" y1="210" x2="590" y2="280" stroke="#5E35B1" stroke-width="1.5" opacity="0.6"/>

  <!-- ====== FIAT TILE ====== -->
  <rect x="195" y="285" width="210" height="120" rx="8" fill="#14142b" stroke="#1976D2" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="309" text-anchor="middle" class="sans" font-weight="700" font-size="11" fill="#90CAF9">Fiat Providers</text>
  <text x="300" y="327" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">Stripe · PayPal · Wise</text>
  <text x="300" y="343" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">Skrill · BMAC · GitHub</text>
  <text x="300" y="363" text-anchor="middle" class="sans" font-size="9" fill="#64B5F6">On click → window.open(url)</text>
  <text x="300" y="380" text-anchor="middle" class="sans" font-size="9" fill="#64B5F6">emit transaction-intent</text>

  <!-- ====== CRYPTO TILE ====== -->
  <rect x="340" y="285" width="210" height="120" rx="8" fill="#14142b" stroke="#F57C00" stroke-width="1" filter="url(#shadow)"/>
  <text x="445" y="309" text-anchor="middle" class="sans" font-weight="700" font-size="11" fill="#FFCC80">Crypto Providers</text>
  <text x="445" y="327" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">BTC · ETH · USDC · SOL</text>
  <text x="445" y="343" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">Lightning · on-chain</text>
  <text x="445" y="363" text-anchor="middle" class="sans" font-size="9" fill="#FFB74D">On click → clipboard.writeText(addr)</text>
  <text x="445" y="380" text-anchor="middle" class="sans" font-size="9" fill="#FFB74D">emit provider-opened</text>

  <!-- ====== EXPANSION PANEL ====== -->
  <rect x="485" y="285" width="210" height="120" rx="8" fill="#14142b" stroke="#5E35B1" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="309" text-anchor="middle" class="sans" font-weight="700" font-size="11" fill="#B39DDB">Per-Tile Content</text>
  <text x="590" y="330" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">steps[] → ordered list</text>
  <text x="590" y="348" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">requirements[] → checklist</text>
  <text x="590" y="368" text-anchor="middle" class="sans" font-size="9" fill="#CE93D8">VExpansionPanel</text>
  <text x="590" y="385" text-anchor="middle" class="sans" font-size="9" fill="#CE93D8">auto-dispatched by key presence</text>

  <!-- ====== BRANDING STRIP ====== -->
  <rect x="50" y="430" width="680" height="45" rx="6" fill="#14142b" stroke="#E53935" stroke-width="1" filter="url(#shadow)"/>
  <text x="390" y="452" text-anchor="middle" class="sans" font-weight="700" font-size="11" fill="#EF9A9A">White-Label Branding</text>
  <text x="390" y="468" text-anchor="middle" class="mono" font-size="9" fill="#8a8aa0">heroGradient · accentColor · ctaButtonColor · pattern slot override</text>

  <!-- Bottom legend -->
  <rect x="0" y="495" width="780" height="25" fill="#0a0a12"/>
  <text x="390" y="512" text-anchor="middle" class="sans" font-size="10" fill="#585870">
    &lt;WbPayHub :providers="MIXED_FIAT_AND_CRYPTO" :product="'wb-code'" :recipient="ME" /&gt;
  </text>
</svg>
